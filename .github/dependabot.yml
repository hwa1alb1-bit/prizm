version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    groups:
      next-runtime:
        patterns:
          - 'next'
          - 'react'
          - 'react-dom'
      provider-sdks:
        patterns:
          - '@aws-sdk/*'
          - '@supabase/*'
          - '@upstash/*'
          - '@sentry/*'
          - 'stripe'
          - 'resend'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:30'
      timezone: 'America/New_York'
