name: Promote production alias

# Vercel's GitHub integration ships a production deploy on every push to
# main, but on this project the custom-domain aliases
# (pdftoexcelstatementconverter.com + www) do NOT auto-follow it. The
# edge then keeps serving the previous deploy's response for any path —
# including 404s for routes that did not exist yet. This is what bit
# /forgot-password, /reset, /faq, /auth/finish, and /login historically
# and required the .vercel-cache-bust + manual Promote pattern.
#
# This workflow makes the alias auto-follow main: after CI succeeds it
# polls Vercel for the new production deploy with the same SHA, then
# assigns apex + www to it via the deployment-aliases API.
#
# Requirements:
#   - repo secret VERCEL_TOKEN with at least "Read + Write Deployments"
#     scope (https://vercel.com/account/tokens, scope to the team)
#
# Idempotent: re-running for the same SHA reassigns the same alias to
# the same deploy and Vercel responds with the existing assignment.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA on main to promote (defaults to current HEAD)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  promote:
    name: Alias apex + www to latest production deploy
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.event == 'push'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_TEAM_ID: team_uZERsB7RBuE8AlDoUPRlw5zz
      VERCEL_PROJECT_ID: prj_PcZSm3UYukEIrL1LxsbdrRuiPaos
      DOMAINS: 'pdftoexcelstatementconverter.com www.pdftoexcelstatementconverter.com'
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Guard — VERCEL_TOKEN must be set
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::VERCEL_TOKEN secret is empty. Verify a *repository* secret"
            echo "::error::named exactly 'VERCEL_TOKEN' exists at"
            echo "::error::https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "::error::See docs/runbooks/vercel-alias.md for the one-time setup steps."
            exit 1
          fi
          echo "VERCEL_TOKEN is set (length: ${#VERCEL_TOKEN})"

      - name: Resolve commit SHA to promote
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${{ inputs.sha }}"
            if [ -z "$SHA" ]; then
              SHA="${{ github.sha }}"
            fi
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Promoting SHA: $SHA"

      - name: Wait for production deploy READY
        id: deploy
        env:
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          set -euo pipefail
          DEPLOY=""
          for i in $(seq 1 60); do
            # Fail fast if any deployment for this SHA is BLOCKED. This is the
            # signature of a paused Vercel project (Spend Management cap, manual
            # pause, billing issue). Polling 10 min for a BLOCKED deploy to go
            # READY is wasted time — the project needs human intervention first.
            ANY_BODY=$(curl -fsS \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_TEAM_ID&limit=20")
            BLOCKED=$(echo "$ANY_BODY" | jq -r --arg sha "$SHA" '.deployments[] | select(.meta.githubCommitSha == $sha) | select(.state == "BLOCKED") | .uid' | head -1)
            if [ -n "$BLOCKED" ] && [ "$BLOCKED" != "null" ]; then
              echo "::error::Vercel deployment $BLOCKED for SHA $SHA is BLOCKED."
              echo "::error::The Vercel project is paused. Resume it at:"
              echo "::error::https://vercel.com/$VERCEL_TEAM_ID/$VERCEL_PROJECT_ID/settings"
              echo "::error::Most common cause: Spend Management cap. Check:"
              echo "::error::https://vercel.com/teams/$VERCEL_TEAM_ID/usage"
              echo "::error::After resuming, redeploy the BLOCKED build from its inspector page,"
              echo "::error::then re-run this workflow via workflow_dispatch with the SHA."
              exit 1
            fi

            BODY=$(curl -fsS \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_TEAM_ID&target=production&state=READY&limit=20")
            DEPLOY=$(echo "$BODY" | jq -r --arg sha "$SHA" '.deployments[] | select(.meta.githubCommitSha == $sha) | .uid' | head -1)
            if [ -n "$DEPLOY" ] && [ "$DEPLOY" != "null" ]; then
              echo "deploy=$DEPLOY" >> "$GITHUB_OUTPUT"
              echo "Found READY production deploy for $SHA: $DEPLOY"
              exit 0
            fi
            echo "[$i/60] No READY production deploy yet for $SHA. Sleeping 10s..."
            sleep 10
          done
          echo "::error::No READY production deploy for SHA $SHA after 10 minutes" >&2
          exit 1

      - name: Assign apex + www aliases
        env:
          DEPLOY: ${{ steps.deploy.outputs.deploy }}
        run: |
          set -euo pipefail
          for D in $DOMAINS; do
            echo "::group::Aliasing $D -> $DEPLOY"
            HTTP=$(curl -sS -o /tmp/resp -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.vercel.com/v2/deployments/$DEPLOY/aliases?teamId=$VERCEL_TEAM_ID" \
              -d "{\"alias\":\"$D\"}")
            cat /tmp/resp
            echo
            # 200/201 = alias newly assigned or reassigned (success).
            # 409 with code:not_modified = alias already points at this deploy
            # (Vercel auto-aliases on production redeploy). Treat as success so
            # re-runs are idempotent — this is the intended invariant of this
            # workflow per the file header.
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
              :
            elif [ "$HTTP" = "409" ] && jq -e '.error.code == "not_modified"' /tmp/resp >/dev/null 2>&1; then
              echo "Alias for $D already points at $DEPLOY — no-op success."
            else
              echo "::error::Alias assignment for $D returned HTTP $HTTP" >&2
              exit 1
            fi
            echo "::endgroup::"
          done

      - name: Verify alias serves new build
        env:
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          set -euo pipefail
          # Hit a path with a unique cache buster so we get origin-fresh response.
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://pdftoexcelstatementconverter.com/?cb=$SHA")
          echo "Apex GET / returned HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Apex did not return 200 immediately after promote (HTTP $STATUS). Edge may still be propagating." >&2
          fi

      # promote-production.yml is workflow_run-triggered with no PR / branch
      # context, so actions/checkout has to be explicit. The IndexNow steps
      # below need the repo on disk (pnpm-lock.yaml, scripts/indexnow-ping.ts).
      # The earlier alias steps run on curl + Vercel API only, so they ran
      # fine even without checkout — but the Setup Node step that follows
      # requires the lockfile and fails the whole workflow without it.
      - name: Checkout (for IndexNow ping)
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies (no scripts, no frozen-lockfile for cross-platform CI)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Submit URLs to IndexNow (Bing + Yandex)
        # Non-blocking: a failed IndexNow ping should not fail the promote.
        # Bing + Yandex consume IndexNow directly; Google ignores it.
        continue-on-error: true
        run: pnpm tsx scripts/indexnow-ping.ts
